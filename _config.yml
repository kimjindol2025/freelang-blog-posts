# Jekyll configuration for FreeLang Blog Posts

title: FreeLang Blog Posts
description: Technical articles on compiler design, database systems, and systems programming
url: https://kimjindol2025.github.io
baseurl: /freelang-blog-posts

theme: minima
markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - .git
  - .github
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - POSTING_GUIDE.md
  - PROJECT_BLOG_STRATEGY.md

# 모든 마크다운 파일(루트 포함)에 post 레이아웃 적용
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "post"
      permalink: /:title/
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:title/

author:
  name: FreeLang Team
  email: info@freelang.dev

show_excerpts: true

# Pretty URLs (index.html 형태)
permalink: /:title/
